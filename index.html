<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Coming Soon</title>
  <meta name="description" content="A new product is coming soon. Stay tuned for updates." />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #1f1f1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      max-width: 720px;
      text-align: center;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 13px;
      margin-bottom: 18px;
      color: #7a6a58;
    }

    h1 {
      font-size: clamp(42px, 8vw, 76px);
      line-height: 1;
      margin: 0 0 24px;
    }

    p {
      font-size: 20px;
      line-height: 1.5;
      margin: 0 auto 32px;
      max-width: 560px;
      color: #4d463f;
    }

    .button {
      display: inline-block;
      background: #1f1f1f;
      color: #ffffff;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 999px;
      font-weight: bold;
    }

    .note {
      margin-top: 24px;
      font-size: 14px;
      color: #7a6a58;
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="eyebrow">Coming Soon</div>
    <h1>Something new is on the way.</h1>
    <p>
      We’re getting ready to launch a product designed to make a meaningful difference.
      Check back soon for updates.
    </p>

    <a class="button" href="mailto:hello@yourdomain.com">Contact Us</a>

    <div class="note">Launching soon.</div>
  </main>
</body>
</html>
